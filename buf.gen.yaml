version: v2
plugins:
  - local: protoc-gen-go
    out: proto
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: proto
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: proto
    opt:
      - paths=source_relative
      - grpc_api_configuration=./product_gateway_grpc_gateway.yaml